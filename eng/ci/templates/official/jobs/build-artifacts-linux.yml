jobs:
- job: BuildArtifactsLinux
  displayName: Build Linux Artifacts

  variables:
    project: src/WebJobs.Script.WebHost/WebJobs.Script.WebHost.csproj
    configuration: release
    runtime: linux-x64
    intermediate_path: $(Agent.TempDirectory)/linux_host
    drop_path: $(Build.ArtifactStagingDirectory)
    linux_drop_path: $(drop_path)/linux
    build_args: '-v m -c $(configuration) -r $(runtime)'

  templateContext:
    outputParentDirectory: $(drop_path)
    outputs:
    # TODO: onboard to Azure Artifacts Drops to allow accessing this from docker linux pipeline in msazure
    # https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-docs/azure-artifacts/artifact-services-onboarding
    - output: pipelineArtifact
      displayName: Publish linux artifacts
      path: $(linux_drop_path)
      artifact: drop_linux

  pool:
    name: 1es-pool-azfunc
    image: 1es-ubuntu-24.04-min
    os: linux

  steps:
  - template: /eng/ci/templates/install-dotnet.yml@self

  - task: DotNetCoreCLI@2
    displayName: Restore
    inputs:
      command: custom
      custom: restore
      projects: $(project)
      arguments: '-v m -r $(runtime) -p:PublishReadyToRun=true' # add PublishReadyToRun=true for https://github.com/dotnet/sdk/issues/20701

  - task: DotNetCoreCLI@2
    displayName: Build
    inputs:
      command: custom
      custom: build
      projects: $(project)
      arguments: '$(build_args) --no-restore'

  - task: DotNetCoreCLI@2
    displayName: Publish
    inputs:
      command: custom
      custom: publish
      publishWebProjects: false # we use our own publish logic
      zipAfterPublish: false # we use our own zip logic
      modifyOutputPath: false
      projects: $(project)
      arguments: '$(build_args) --no-build -o $(intermediate_path)'

  # Pipeline artifacts do not retain file metadata and lose file permission bits.
  # As a workaround, we tar/gzip the files to retain the permission bits.
  - task: ArchiveFiles@2
    displayName: Archive Linux Artifacts
    inputs:
      rootFolderOrFile: $(intermediate_path)
      includeRootFolder: false
      archiveType: tar
      tarCompression: gz
      archiveFile: $(linux_drop_path)/host.linux-x64.tar.gz
